<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Form - Alfakki School</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f5f5;
}

/* NAVBAR */
#navbar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(10,42,67,0.8);
  color: white;
}

.menu-toggle {
  display: none;
}

#nav-links {
  display: flex;
  gap: 20px;
  list-style: none;
}

#nav-links a {
  color: white;
  text-decoration: none;
}

/* FORM SECTION */
.container {
  margin-top: 100px;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.form-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.form-box h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #0a2a43;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #00c3ff;
}

/* SUCCESS MESSAGE */
.success {
  display: none;
  text-align: center;
  color: green;
  margin-top: 10px;
}

/* MOBILE */
@media(max-width:768px){
  #nav-links {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav id="navbar">
  <h2>Alfakki</h2>
  <ul id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="videos.html">Videos</a></li>
      <li><a href="imgs.html">Images</a></li>
      <li><a href="#sellform">Buy Form</a></li>
  </ul>
</nav>

<!-- FORM -->
<div class="container">
  <div class="form-box">
    <h2>Buy Graduation Form</h2>

    <form id="buyForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="text" id="student" placeholder="Student Name" required>
      <select id="class" required>
        <option value="">Select Class</option>
        <option>Nursery</option>
        <option>Primary</option>
        <option>Secondary</option>
      </select>
      <input type="tel" id="phone" placeholder="Phone Number" required>

      <button type="submit">Submit</button>
    </form>

    <p class="success" id="successMsg">✅ Submitted Successfully!</p>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FORM SUBMIT
document.getElementById("buyForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  await addDoc(collection(db, "orders"), {
    name: document.getElementById("name").value,
    student: document.getElementById("student").value,
    class: document.getElementById("class").value,
    phone: document.getElementById("phone").value,
    date: new Date()
  });

  document.getElementById("successMsg").style.display = "block";
  document.getElementById("buyForm").reset();
});
</script>

</body>
</html>
